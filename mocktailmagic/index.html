<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mocktail Magic 🍓</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <nav class="navbar">
    <div class="logo">🍹 Mocktail Magic</div>

    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="store.html">Submit Recipe</a></li>
      <li><a href="#">Favorites</a></li>
      <li><a href="#">About</a></li>
    </ul>
    </div>
  </nav>

  <header>
    <h1>🍹 Mocktail Magic</h1>
    <p>Fresh, fruity, and alcohol-free delights</p>
  </header>

  <div class="filters">
    <button onclick="filterRecipes('all')">All</button>
    <button onclick="filterRecipes('citrus')">Citrus 🍊</button>
    <button onclick="filterRecipes('berry')">Berry 🍓</button>
    <button onclick="filterRecipes('tropical')">Tropical 🍍</button>
  </div>

  <main id="recipeContainer"></main>

  <div id="modal" class="modal hidden">
    <div class="modal-content">
      <span onclick="closeModal()" class="close">&times;</span>
      <h2 id="modalTitle"></h2>
      <p id="modalIngredients"></p>
      <p id="modalSteps"></p>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
